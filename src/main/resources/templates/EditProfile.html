<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Profile - CupidReads</title>
    <style>
        /* Global Styling */
        body {
            background: url('/images/vintage-paper.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Garamond', serif;
            color: #2c1d27;
            margin: 0;
            padding: 0;
        }

        /* Navigation Bar */
        nav {
            background: linear-gradient(to right, #a40606, #d98324);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav a {
            color: #f5f1e9;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 15px;
            transition: 0.3s ease;
        }

        nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }

        /* Form Container */
        .form-container {
            max-width: 700px;
            margin: 60px auto;
            background: rgba(255, 248, 220, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(164, 6, 6, 0.4);
            text-align: center;
            animation: fadeIn 1.2s ease-in-out;
        }

        /* Form Styling */
        label {
            font-size: 18px;
            font-weight: bold;
            color: #7a1212;
            display: block;
            margin-top: 15px;
            text-align: left;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            font-size: 16px;
            border: 2px solid #d98324;
            border-radius: 5px;
            outline: none;
            transition: 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        input:focus, textarea:focus, select:focus {
            border-color: #a40606;
        }

        /* Profile Picture Upload */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #d98324;
            object-fit: cover;
            margin-bottom: 10px;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 18px;
            background: #a40606;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #7a1212;
        }

        /* Fade In Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav>
    <a href="/home">Home</a>
    <a href="/swipe-books">Swipe Books</a>
    <a href="/my-books">My Books</a>
    <a href="/clubs">Clubs</a>
    <a href="/profile">Profile</a>
    <a href="/logout" style="float: right;">Logout</a>
</nav>

<!-- Edit Profile Form -->
<div class="form-container">
    <h1 style="color: #a40606;">✏️ Edit Your Profile</h1>

    <!-- Profile Picture Preview -->
    <img th:src="${profilePicture} ?: '/images/default-profile.png'" alt="Profile Picture" class="profile-img">
    
    <form action="/update-profile" method="POST" enctype="multipart/form-data">
        <!-- Profile Picture Upload -->
        <label for="profilePicture">📸 Upload Profile Picture:</label>
        <input type="file" id="profilePicture" name="profilePicture" accept="image/*">

        <!-- Name -->
        <label for="userName">🖊️ Full Name:</label>
        <input type="text" id="userName" name="userName" th:value="${userName}" required>

        <!-- Bio -->
        <label for="bio">📜 Bio:</label>
        <textarea id="bio" name="bio" rows="3" th:text="${userBio}" placeholder="Tell us about yourself..."></textarea>

        <!-- Favorite Genres -->
        <label for="favoriteGenres">📖 Favorite Genres:</label>
        <select id="favoriteGenres" name="favoriteGenres" multiple>
            <option value="fiction">Fiction</option>
            <option value="non-fiction">Non-Fiction</option>
            <option value="fantasy">Fantasy</option>
            <option value="mystery">Mystery</option>
            <option value="sci-fi">Science Fiction</option>
            <option value="romance">Romance</option>
        </select>

        <!-- Favorite Languages -->
        <label for="favoriteLanguages">🌍 Favorite Languages:</label>
        <select id="favoriteLanguages" name="favoriteLanguages" multiple>
            <option value="english">English</option>
            <option value="spanish">Spanish</option>
            <option value="french">French</option>
            <option value="german">German</option>
            <option value="hindi">Hindi</option>
        </select>

        <!-- Save Button -->
        <button type="submit" class="btn">Save Changes</button>
        <a href="/profile" class="btn">← Cancel</a>
    </form>
</div>

</body>
</html>
